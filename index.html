<html>
<head>
    <title>Ordered List & Unordered List</title>
</head>
<body>

<h4>An ordered List :</h4>
<ol>
    <li>Coffee</li>
    <li>Tea</li>
    <li>Milk</li>
</ol>


<h4>An ordered List :</h4>
<ol type="I">
    <li>Milkshake</li>
    <li>Cappuccino</li>
    <li>Juice</li>
</ol type="I">

<h4>An unordered List :</h4>
<ul>
    <li>Coffee</li>
    <li>Tea</li>
    <li>Milk</li>
</ul>

<h4>An unordered List :</h4>
<ul type="square">
    <li>Milkshake</li>
    <li>Cappuccino</li>
    <li>Juice</li>
</ul type="square">

</body>
</html>
